<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Relatórios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #4a6fa5;
            --light: #f8fafc;
            --lighter: #ffffff;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.01);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--gray-100);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--gray-600);
            line-height: 1.5;
        }

        /* Sidebar Moderna */
        .app-sidebar {
            background: var(--lighter);
            min-height: 100vh;
            position: fixed;
            width: 280px;
            left: 0;
            top: 0;
            border-right: 1px solid var(--gray-200);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
        }

        .logo-container {
            padding: 0 1.5rem;
            margin-bottom: 2.5rem;
        }

        #logo-box {
            background: var(--gray-100);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
            border: 1px dashed var(--gray-300);
            transition: var(--transition);
        }

        #logo-box:hover {
            border-color: var(--accent);
            background: var(--light);
        }

        #logo-box img {
            max-height: 50px;
            width: auto;
            object-fit: contain;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
        }

        .menu a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .menu li {
            padding: 0.75rem 1.5rem;
            margin: 0.25rem 0.75rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            color: var(--gray-500);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .menu li i {
            margin-right: 1rem;
            font-size: 1.25rem;
            width: 24px;
            color: var(--gray-400);
            transition: var(--transition);
        }

        .menu li:hover {
            background: var(--gray-100);
            color: var(--primary);
        }

        .menu li:hover i {
            color: var(--accent);
        }

        .menu li.active {
            background: var(--gray-100);
            color: var(--primary);
            font-weight: 600;
        }

        .menu li.active i {
            color: var(--accent);
        }

        /* Conteúdo Principal */
        .app-content {
            margin-left: 280px;
            padding: 2rem 2.5rem;
            min-height: 100vh;
        }

        /* Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .app-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .app-title i {
            color: var(--accent);
            margin-right: 0.5rem;
        }

        .btn-outline-secondary {
            border: 1px solid var(--gray-200);
            color: var(--gray-500);
            background: var(--lighter);
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .btn-outline-secondary:hover {
            background: var(--gray-100);
            border-color: var(--gray-300);
            color: var(--primary);
            transform: translateY(-1px);
        }

        /* Filtros */
        .filter-section {
            background: var(--lighter);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
        }

        .form-label {
            font-weight: 500;
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }

        .form-select, .form-control {
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            color: var(--gray-600);
            background: var(--lighter);
            transition: var(--transition);
        }

        .form-select:focus, .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.1);
            outline: none;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: var(--radius-md);
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            color: white;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* Cards de Métricas */
        .metric-card {
            background: var(--lighter);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
            transition: var(--transition);
            height: 100%;
        }

        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--gray-300);
        }

        .metric-label {
            color: var(--gray-400);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }

        /* Tabs */
        .nav-tabs {
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 2rem;
            gap: 0.5rem;
        }

        .nav-tabs .nav-link {
            color: var(--gray-500);
            border: none;
            padding: 0.75rem 1.25rem;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            transition: var(--transition);
            background: transparent;
        }

        .nav-tabs .nav-link:hover {
            color: var(--primary);
            background: var(--gray-100);
        }

        .nav-tabs .nav-link.active {
            color: var(--primary);
            background: transparent;
            border-bottom: 2px solid var(--accent);
            font-weight: 600;
        }

        .nav-tabs .nav-link i {
            margin-right: 0.5rem;
            font-size: 1rem;
        }

        /* Cards de Painel */
        .card-panel {
            background: var(--lighter);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
            margin-bottom: 1.5rem;
        }

        .card-panel h5 {
            color: var(--primary);
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }

        .card-panel h5 i {
            color: var(--accent);
            margin-right: 0.75rem;
            font-size: 1.25rem;
        }

        /* Tabelas */
        .table {
            color: var(--gray-600);
            margin-bottom: 0;
        }

        .table thead th {
            border-top: none;
            border-bottom: 1px solid var(--gray-200);
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            padding: 1rem 0.75rem;
            background: var(--gray-100);
        }

        .table tbody td {
            padding: 1rem 0.75rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--gray-200);
        }

        .table-hover tbody tr:hover {
            background: var(--gray-100);
        }

        /* Badges */
        .badge {
            font-weight: 500;
            padding: 0.5rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .badge.bg-success {
            background: #10b981 !important;
            color: white;
        }

        .badge.bg-danger {
            background: #ef4444 !important;
            color: white;
        }

        .badge.bg-warning {
            background: #f59e0b !important;
            color: white;
        }

        .badge.bg-info {
            background: #3b82f6 !important;
            color: white;
        }

        .badge.bg-secondary {
            background: var(--gray-400) !important;
            color: white;
        }

        /* Gráficos */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            margin-top: 1rem;
            overflow: hidden; /* Adicionar esta linha */
        }

        .chart-container canvas {
            max-width: 100%;
            height: auto !important;
        }

        /* No Data */
        .no-data {
            color: var(--gray-400);
            font-style: italic;
            text-align: center;
            padding: 2.5rem;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            border: 1px dashed var(--gray-300);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(3px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay .spinner-border {
            width: 3rem;
            height: 3rem;
            color: var(--accent) !important;
        }

        /* Botão Home */
        .btn-home {
            position: fixed;
            left: 300px;
            bottom: 30px;
            z-index: 1100;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0.75rem 1.25rem;
            border-radius: 999px;
            text-decoration: none;
            background: var(--lighter);
            color: var(--gray-600);
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-md);
            font-weight: 500;
            transition: var(--transition);
            backdrop-filter: blur(6px);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            color: var(--primary);
            border-color: var(--gray-300);
        }

        .btn-home i {
            font-size: 1.1rem;
            color: var(--accent);
        }

        @media (max-width: 992px) {
            .app-sidebar {
                position: static;
                width: 100%;
                min-height: auto;
                border-right: none;
                border-bottom: 1px solid var(--gray-200);
                padding: 1rem;
            }

            .app-content {
                margin-left: 0;
                padding: 1.5rem;
            }

            .btn-home {
                left: 20px;
            }
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--gray-100);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }

        /* Responsividade das métricas */
        @media (max-width: 768px) {
            .metric-value {
                font-size: 1.5rem;
            }
            
            .app-title {
                font-size: 1.5rem;
            }
        }

        /* Data personalizada */
        #data-personalizada {
            transition: var(--transition);
        }

        /* List group */
        .list-group-item {
            border: 1px solid var(--gray-200);
            color: var(--gray-600);
            background: var(--lighter);
        }

        .list-group-item:hover {
            background: var(--gray-100);
        }
    </style>
</head>
<body>
    <a href="/" class="btn-home" aria-label="Ir para a página inicial">
        <i class="bi bi-house-door-fill"></i>
        <span>Home</span>
    </a>

    <div class="app-sidebar">
        <div class="logo-container">
            <div id="logo-box" class="mb-3">
                <!-- Logo será carregada via JS -->
            </div>
            <div class="logo-text">Gestão de Relatórios</div>
        </div>
        
        <ul class="menu">
            <a href="/estoque">
                <li id="menu-estoque">
                    <i class="bi bi-box-seam"></i>
                    Estoque
                </li>
            </a>
            <a href="/atendimento">
                <li id="menu-atendimento">
                    <i class="bi bi-chat-dots"></i>
                    Atendimento
                </li>
            </a>
            <a href="/relatorios">
                <li class="active" id="menu-relatorios">
                    <i class="bi bi-graph-up"></i>
                    Relatórios
                </li>
            </a>
        </ul>
    </div>

    <div class="app-content">
        <div class="app-header">
            <h1 class="app-title">
                <i class="bi bi-graph-up"></i>
                Relatórios
            </h1>
            <button class="btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#modalLogo">
                <i class="bi bi-image me-2"></i>
                Alterar Logo
            </button>
        </div>

        <!-- Filtros -->
        <div class="filter-section">
            <div class="row g-4">
                <div class="col-md-4">
                    <label for="periodo" class="form-label">Período</label>
                    <select id="periodo" class="form-select">
                        <option value="hoje">Hoje</option>
                        <option value="semana" selected>Esta semana</option>
                        <option value="mes">Este mês</option>
                        <option value="ano">Este ano</option>
                        <option value="personalizado">Personalizado</option>
                    </select>
                </div>
                <div class="col-md-4" id="data-personalizada" style="display:none;">
                    <label class="form-label">Intervalo de Datas</label>
                    <div class="d-flex gap-2">
                        <input type="date" id="dataInicio" class="form-control">
                        <span class="align-self-center text-muted">até</span>
                        <input type="date" id="dataFim" class="form-control">
                    </div>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn-primary w-100" onclick="carregarRelatorio()">
                        <i class="bi bi-filter-circle me-2"></i>
                        Aplicar Filtros
                    </button>
                </div>
            </div>
        </div>

        <!-- Métricas principais -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-label">Atendimentos</div>
                    <div class="metric-value" id="m-atendimentos">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-label">Faturamento</div>
                    <div class="metric-value" id="m-faturamento">R$ 0,00</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-label">Média por Atendimento</div>
                    <div class="metric-value" id="m-ticket">R$ 0,00</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-label">Produtos Vendidos</div>
                    <div class="metric-value" id="m-produtos">0</div>
                </div>
            </div>
        </div>

        <!-- Métricas secundárias -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-label">Gastos</div>
                    <div class="metric-value" id="m-gastos">R$ 0,00</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card">
                    <div class="metric-label">Lucro</div>
                    <div class="metric-value" id="m-lucro">R$ 0,00</div>
                </div>
            </div>
        </div>

        <!-- Abas de relatórios -->
        <ul class="nav nav-tabs" id="abas-relatorio">
            <li class="nav-item">
                <button class="nav-link active" onclick="trocaAba('vendas')" id="tab-vendas">
                    <i class="bi bi-currency-dollar"></i>
                    Vendas
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="trocaAba('produtos')" id="tab-produtos">
                    <i class="bi bi-box"></i>
                    Produtos
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="trocaAba('servicos')" id="tab-servicos">
                    <i class="bi bi-tools"></i>
                    Serviços
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="trocaAba('estoque')" id="tab-estoque">
                    <i class="bi bi-clipboard-data"></i>
                    Estoque
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="trocaAba('orcamentos')" id="tab-orcamentos">
                    <i class="bi bi-file-text"></i>
                    Orçamentos
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="trocaAba('agendamentos')" id="tab-agendamentos">
                    <i class="bi bi-calendar-event"></i>
                    Agendamentos
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="trocaAba('atendentes')" id="tab-atendentes">
                    <i class="bi bi-people"></i>
                    Atendentes
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="trocaAba('bairros')" id="tab-bairros">
                    <i class="bi bi-geo-alt"></i>
                    Bairros
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="trocaAba('compras')" id="tab-compras">
                    <i class="bi bi-cart"></i>
                    Compras
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="trocaAba('fornecedores')" id="tab-fornecedores">
                    <i class="bi bi-truck"></i>
                    Fornecedores
                </button>
            </li>
        </ul>

        <div id="painel-abas"></div>
    </div>

    <!-- Modal Nota Fiscal -->
    <div class="modal fade" id="modalNotaFiscal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-receipt me-2"></i>
                        Gerenciar Notas Fiscais
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4" id="conteudo-modal-nota"></div>
            </div>
        </div>
    </div>

    <!-- Modal Logo -->
    <div class="modal fade" id="modalLogo" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-image me-2"></i>
                        Alterar Logo do Sistema
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-upload-logo">
                        <div class="mb-3">
                            <label class="form-label">Selecionar Imagem</label>
                            <input type="file" name="imagem" accept="image/*" class="form-control" required>
                        </div>
                        <button class="btn-primary w-100" type="submit">
                            <i class="bi bi-upload me-2"></i>
                            Enviar Imagem
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    /* Redireciona para /login quando a sessão for invalidada */
    (function () {
        const _fetch = window.fetch.bind(window);
        window.fetch = async (...args) => {
            const resp = await _fetch(...args);
            if (resp && (resp.status === 401 || resp.status === 403)) {
                try {
                    const j = await resp.clone().json();
                    const err = (j && j.error) || "";
                    if (err === "sessao_invalidada" || err === "usuario_desabilitado_ou_sessao_invalida" || err === "licenca_inativa") {
                        window.location.href = "/login";
                    }
                } catch (_) {}
            }
            return resp;
        };
    })();

    const API_URL = "/api/relatorios";
    let abaAtual = "vendas";

    function carregarNotas() {
        fetch('/api/notas')
            .then(r => r.json())
            .then(notas => {
                let html = '<table class="table"><thead><tr><th>ID</th><th>Data</th><th>Natureza</th><th>Emitente</th><th>Valor</th><th>Ações</th></tr></thead><tbody>';
                notas.forEach(nota => {
                    html += `<tr>
                        <td>${nota.id}</td>
                        <td>${nota.data_emissao || ''}</td>
                        <td>${nota.natureza_operacao || ''}</td>
                        <td>${nota.emitente_nome || ''}</td>
                        <td>${parseFloat(nota.valor_total || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="abrirModalNota('editar', ${nota.id})">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="abrirModalNota('excluir', ${nota.id})">

    function listarNotasParaEscolha(modo) {
        fetch('/api/notas')
            .then(r => r.json())
            .then(notas => {
                let html = '<h6 class="mb-3">Selecione a Nota:</h6><div class="list-group">';
                if (!notas.length) {
                    html += '<div class="no-data">Nenhuma nota cadastrada</div>';
                } else {
                    notas.forEach(nota => {
                        html += `<button type="button" class="list-group-item list-group-item-action" 
                                    onclick="abrirModalNota('${modo}', ${nota.id})">
                                    #${nota.id} | ${nota.emitente_nome || '-'} | ${nota.data_emissao || '-'} | ${(nota.valor_total || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
                                </button>`;
                    });
                }
                html += '</div>';
                document.getElementById('conteudo-modal-nota').innerHTML = html;

                let modal = new bootstrap.Modal(document.getElementById('modalNotaFiscal'));
                modal.show();
            });
    }

    function abrirModalNota(modo = 'cadastrar', id = null) {
        if (modo === 'cadastrar') {
            document.getElementById('conteudo-modal-nota').innerHTML = gerarFormularioNota({}, {}, 'cadastrar');
            new bootstrap.Modal(document.getElementById('modalNotaFiscal')).show();
        } else if (modo === 'editar' && id) {
            fetch(`/api/notas/${id}`)
                .then(r => r.json())
                .then(nota => {
                    document.getElementById('conteudo-modal-nota').innerHTML = gerarFormularioNota(nota, {}, 'editar', id);
                    new bootstrap.Modal(document.getElementById('modalNotaFiscal')).show();
                });
        } else if (modo === 'excluir' && id) {
            if (confirm("Tem certeza que deseja excluir esta nota?")) {
                fetch(`/api/notas/${id}`, { method: 'DELETE' })
                    .then(r => r.json())
                    .then(resp => {
                        alert("Nota excluída com sucesso.");
                        bootstrap.Modal.getInstance(document.getElementById('modalNotaFiscal')).hide();
                        carregarRelatorio();
                    });
            }
        }
    }

    function trocaAba(nome) {
        abaAtual = nome;
        document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab-' + nome).classList.add('active');
        carregarRelatorio();
    }

    document.getElementById('periodo').onchange = function () {
        document.getElementById('data-personalizada').style.display = (this.value == "personalizado" ? 'block' : 'none');
    };

    function carregarRelatorio() {
        let periodo = document.getElementById('periodo').value;
        let url = API_URL + "?periodo=" + periodo;
        if (periodo === 'personalizado') {
            let di = document.getElementById('dataInicio').value;
            let df = document.getElementById('dataFim').value;
            if (!di || !df) return alert("Selecione o intervalo de datas!");
            url += "&inicio=" + di + "&fim=" + df;
        }

        mostrarLoading(true);
        fetch(url)
            .then(r => r.json())
            .then(dados => {
                atualizarPagina(dados);
                mostrarLoading(false);
            })
            .catch(() => {
                alert('Erro ao buscar relatório. API offline?');
                mostrarLoading(false);
            });
    }

                .then(dados => {
                    // Verificar se existem compras nos dados retornados
                    const compras = dados.compras || [];
                    
                    // Se não houver compras, mostra mensagem
                    if (!compras || compras.length === 0) {
                        painel.innerHTML = `
                        <div class="row">
                            <div class="col-12">
                                <div class="card-panel">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h5 class="mb-0"><i class="bi bi-truck me-2"></i>Compras por Fornecedor</h5>
                                        <span class="badge bg-primary">Total: 0 registro(s)</span>
                                    </div>
                                    <div class="table-responsive">
                                        <table class="table table-hover">
                                            <thead class="table-light">
                                                <tr>
                                                    <th>Data</th>
                                                    <th>Categoria</th>
                                                    <th>Produto/Serviço</th>
                                                    <th>Fornecedor</th>
                                                    <th>CNPJ</th>
                                                    <th>Contato</th>
                                                    <th>Qtd</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr><td colspan="7" class="no-data">Nenhuma compra encontrada no período</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                        return;
                    }

                    // Mapear os dados corretamente
                    const comprasFormatadas = compras.map(c => ({
                        data: c.data ? new Date(c.data).toLocaleDateString('pt-BR') : '-',
                        categoria: c.categoria_custo || (c.tipo === 'produto' ? 'produto' : 'servico') || '-',
                        produto_servico: c.descricao || c.produto_nome || c.nome_produto || '-',
                        fornecedor: c.fornecedor_nome || '-',
                        cnpj: c.fornecedor_cnpj || '-',
                        contato: c.fornecedor_contato || '-',
                        quantidade: c.quantidade || c.qtd || 0
                    }));

                    painel.innerHTML = `
                    <div class="row">
                        <div class="col-12">
                            <div class="card-panel">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h5 class="mb-0"><i class="bi bi-truck me-2"></i>Compras por Fornecedor</h5>
                                    <span class="badge bg-primary">Total: ${comprasFormatadas.length} registro(s)</span>
                                </div>
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead class="table-light">
                                            <tr>
                                                <th>Data</th>
                                                <th>Categoria</th>
                                                <th>Produto/Serviço</th>
                                                <th>Fornecedor</th>
                                                <th>CNPJ</th>
                                                <th>Contato</th>
                                                <th>Qtd</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${
                                                comprasFormatadas.map(c => `
                                                    <tr>
                                                        <td>${c.data}</td>
                                                        <td><span class="badge ${c.categoria === 'produto' ? 'bg-info' : 'bg-success'}">${c.categoria}</span></td>
                                                        <td class="fw-semibold">${c.produto_servico}</td>
                                                        <td>${c.fornecedor}</td>
                                                        <td>${c.cnpj}</td>
                                                        <td>${c.contato}</td>
                                                        <td><span class="badge bg-primary">${c.quantidade}</span></td>
                                                    </tr>
                                                `).join('')
                                            }
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>`;
                })
                .catch(error => {
                    console.error('Erro ao carregar compras:', error);
                    painel.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Erro ao carregar dados: ${error.message}
                    </div>`;
                });
        }
    }

    function renderGraficosVendas(dados) {
        if (window._graficoFormas) window._graficoFormas.destroy();
        if (window._graficoVendasDia) window._graficoVendasDia.destroy();

        if (dados.formas_pagamento?.length) {
            const ctx = document.getElementById('graficoFormas').getContext('2d');
            window._graficoFormas = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: dados.formas_pagamento.map(f => f.forma),
                    datasets: [{
                        data: dados.formas_pagamento.map(f => f.valor_total),
                        backgroundColor: ['#2c3e50', '#34495e', '#4a6fa5', '#475569', '#64748b']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        const periodo = document.getElementById('periodo')?.value || 'semana';
        const hoje = new Date();

        let tipoGrafico = '';
        let dataInicio = hoje;
        let dataFim = hoje;

        switch (periodo) {
            case 'hoje':
                tipoGrafico = 'horas';
                dataInicio = hoje;
                dataFim = hoje;
                break;
            case 'semana':
                tipoGrafico = 'dias_semana';
                dataFim = new Date(hoje);
                dataInicio = new Date(hoje);
                dataInicio.setDate(dataInicio.getDate() - 6);
                break;
            case 'mes':
                tipoGrafico = 'dias_mes';
                dataInicio = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
                dataFim = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0);
                break;
            case 'ano':
                tipoGrafico = 'meses';
                dataInicio = new Date(hoje.getFullYear(), 0, 1);
                dataFim = new Date(hoje.getFullYear(), 11, 31);
                break;
            case 'personalizado':
                const dataInicioInput = document.getElementById('dataInicio').value;
                const dataFimInput = document.getElementById('dataFim').value;

                if (dataInicioInput && dataFimInput) {
                    dataInicio = new Date(dataInicioInput);
                    dataFim = new Date(dataFimInput);

                    const diasDiferenca = Math.ceil((dataFim - dataInicio) / (1000 * 60 * 60 * 24)) + 1;

                    if (diasDiferenca === 1) {
                        tipoGrafico = 'horas';
                    } else if (diasDiferenca >= 2 && diasDiferenca <= 7) {
                        tipoGrafico = 'dias_semana';
                    } else if (diasDiferenca >= 8 && diasDiferenca <= 31) {
                        tipoGrafico = 'dias_mes';
                    } else {
                        tipoGrafico = 'meses';
                    }
                } else {
                    tipoGrafico = 'dias_semana';
                    dataFim = new Date(hoje);
                    dataInicio = new Date(hoje);
                    dataInicio.setDate(dataInicio.getDate() - 6);
                }
                break;
        }

        let labels = [];
        let dadosGrafico = [];

        const mapaVendas = {};
        (dados.vendas_dia || []).forEach(v => {
            const chave = v.hora || v.dia;
            if (chave) {
                mapaVendas[chave] = parseFloat(v.vendas) || 0;
            }
        });

        switch (tipoGrafico) {
            case 'horas':
                for (let h = 0; h < 24; h++) {
                    const hh = String(h).padStart(2, '0') + ':00';
                    labels.push(hh);
                    dadosGrafico.push(mapaVendas[hh] || 0);
                }
                break;

            case 'dias_semana':
                const dataAtual = new Date(dataInicio);
                while (dataAtual <= dataFim) {
                    const dataFormatada = dataAtual.toISOString().slice(0, 10);
                    const labelFormatado = `${String(dataAtual.getDate()).padStart(2, '0')}/${String(dataAtual.getMonth() + 1).padStart(2, '0')}`;
                    labels.push(labelFormatado);
                    dadosGrafico.push(mapaVendas[dataFormatada] || 0);
                    dataAtual.setDate(dataAtual.getDate() + 1);
                }
                break;

            case 'dias_mes':
                const dataAtualMes = new Date(dataInicio);
                while (dataAtualMes <= dataFim) {
                    const dataFormatada = dataAtualMes.toISOString().slice(0, 10);
                    const dia = dataAtualMes.getDate();
                    labels.push(String(dia));
                    dadosGrafico.push(mapaVendas[dataFormatada] || 0);
                    dataAtualMes.setDate(dataAtualMes.getDate() + 1);
                }
                break;

            case 'meses':
                const mesesNomes = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
                let mesInicio, mesFim, anoInicio, anoFim;

                if (periodo === 'ano') {
                    mesInicio = 0;
                    mesFim = 11;
                    anoInicio = anoFim = hoje.getFullYear();
                } else {
                    mesInicio = dataInicio.getMonth();
                    mesFim = dataFim.getMonth();
                    anoInicio = dataInicio.getFullYear();
                    anoFim = dataFim.getFullYear();
                }

                if (anoFim > anoInicio) {
                    for (let ano = anoInicio; ano <= anoFim; ano++) {
                        const mIni = (ano === anoInicio) ? mesInicio : 0;
                        const mFim = (ano === anoFim) ? mesFim : 11;

                        for (let mes = mIni; mes <= mFim; mes++) {
                            const labelMes = ano === hoje.getFullYear() ? mesesNomes[mes] : `${mesesNomes[mes]}/${ano}`;
                            labels.push(labelMes);

                            let totalMes = 0;
                            const diasNoMes = new Date(ano, mes + 1, 0).getDate();

                            for (let dia = 1; dia <= diasNoMes; dia++) {
                                const data = new Date(ano, mes, dia);
                                const dataFormatada = data.toISOString().slice(0, 10);
                                totalMes += mapaVendas[dataFormatada] || 0;
                            }

                            dadosGrafico.push(totalMes);
                        }
                    }
                } else {
                    for (let mes = mesInicio; mes <= mesFim; mes++) {
                        labels.push(mesesNomes[mes]);

                        let totalMes = 0;
                        const diasNoMes = new Date(anoInicio, mes + 1, 0).getDate();

                        for (let dia = 1; dia <= diasNoMes; dia++) {
                            const data = new Date(anoInicio, mes, dia);
                            const dataFormatada = data.toISOString().slice(0, 10);
                            totalMes += mapaVendas[dataFormatada] || 0;
                        }

                        dadosGrafico.push(totalMes);
                    }
                }
                break;
        }

        if (labels.length > 0) {
            const ctx2 = document.getElementById('graficoVendasDia');
            if (ctx2) {
                window._graficoVendasDia = new Chart(ctx2.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Vendas (R$)',
                            data: dadosGrafico,
                            borderColor: '#2c3e50',
                            backgroundColor: 'rgba(44, 62, 80, 0.05)',
                            fill: true,
                            tension: tipoGrafico === 'horas' ? 0.4 : 0.3,
                            pointBackgroundColor: '#2c3e50',
                            pointBorderColor: '#ffffff',
                            pointBorderWidth: 2,
                            pointRadius: tipoGrafico === 'meses' ? 6 : 4,
                            pointHoverRadius: tipoGrafico === 'meses' ? 8 : 6,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: true, position: 'top' },
                            tooltip: {
                                callbacks: {
                                    label: function (context) {
                                        return 'Vendas: R$ ' + context.parsed.y.toLocaleString('pt-BR', {
                                            minimumFractionDigits: 2,
                                            maximumFractionDigits: 2
                                        });
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function (value) {
                                        return 'R$ ' + value.toLocaleString('pt-BR', {
                                            minimumFractionDigits: 2,
                                            maximumFractionDigits: 2
                                        });
                                    }
                                }
                            }
                        }
                    }
                });
            }
        }
    }

    function renderGraficosProdutos(dados) {
        if (window._graficoProdutos) window._graficoProdutos.destroy();
        if (dados.produtos_vendidos?.length) {
            const ctx = document.getElementById('graficoProdutos').getContext('2d');
            window._graficoProdutos = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dados.produtos_vendidos.map(p => p.nome.length > 15 ? p.nome.substring(0, 15) + '...' : p.nome),
                    datasets: [{
                        label: 'Qtd. Vendida',
                        data: dados.produtos_vendidos.map(p => p.quantidade_vendida),
                        backgroundColor: '#2c3e50',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
    }

    function renderGraficosBairros(dados) {
        if (window._graficoBairros) window._graficoBairros.destroy();
        let lista = document.getElementById('lista-bairros');
        if (lista) {
            lista.innerHTML = dados.bairros?.length ?
                dados.bairros.slice(0, 10).map(b =>
                    `<li class="list-group-item d-flex justify-content-between align-items-center">
                        ${b.nome} <span class="badge bg-primary rounded-pill">${b.atendimentos}</span>
                    </li>`
                ).join('') : '<div class="no-data">Nenhum dado disponível</div>';
        }
        if (dados.bairros?.length) {
            const ctx = document.getElementById('graficoBairros').getContext('2d');
            window._graficoBairros = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dados.bairros.map(b => b.nome.length > 15 ? b.nome.substring(0, 15) + '...' : b.nome),
                    datasets: [{
                        label: 'Atendimentos',
                        data: dados.bairros.map(b => b.atendimentos),
                        backgroundColor: '#2c3e50',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
    }

    function renderGraficoAgendamentosDia(dados) {
        if (window._graficoAgendamentosDia) window._graficoAgendamentosDia.destroy();
        if (dados.agendamentos_dia?.length) {
            const ctx = document.getElementById('graficoAgendamentosDia').getContext('2d');
            window._graficoAgendamentosDia = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dados.agendamentos_dia.map(a => a.dia),
                    datasets: [{
                        label: 'Qtd. Agendamentos',
                        data: dados.agendamentos_dia.map(a => a.quantidade),
                        backgroundColor: '#2c3e50',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
    }

    function mostrarLoading(mostrar) {
        let el = document.getElementById('loadingOverlay');
        if (mostrar) {
            if (!el) {
                el = document.createElement('div');
                el.id = 'loadingOverlay';
                el.className = 'loading-overlay';
                el.innerHTML = `
                    <div class="text-center">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                        <p class="mt-2 text-muted">Carregando relatórios...</p>
                    </div>`;
                document.body.appendChild(el);
            }
        } else if (el) {
            el.remove();
        }
    }

    function gerarFormularioNota(nota = {}, opcoesSelecionadas = {}, modo = 'cadastrar', id = null) {
        const campos = [
            { nome: 'data_emissao', label: 'Data de Emissão', valor: nota.data_emissao || new Date().toISOString().slice(0, 10) },
            { nome: 'natureza_operacao', label: 'Natureza da Operação', valor: nota.natureza_operacao || 'Venda de mercadoria' },
            { nome: 'quantidade', label: 'Quantidade', valor: nota.quantidade || 1 },
            { nome: 'descricao', label: 'Descrição', valor: nota.descricao || 'Produto/Serviço' },
            { nome: 'valor_total', label: 'Valor Total', valor: nota.valor_total || 0 }
        ];

        let html = `<form id="form-nota-fiscal" data-id="${id || ''}" data-modo="${modo}">
            <div class="mb-3">
                <label class="form-label">Nome da Loja *</label>
                <input class="form-control" name="nome_loja" value="${nota.emitente_nome || ''}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Endereço *</label>
                <input class="form-control" name="endereco" value="${nota.emitente_endereco || ''}" required>
            </div>
            <div class="mb-3">
                <label class="form-label"><b>Quais campos você quer incluir?</b></label>`;

        campos.forEach(campo => {
            html += `
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="check_${campo.nome}" name="campos" value="${campo.nome}" ${opcoesSelecionadas[campo.nome] !== false ? 'checked' : ''}>
                    <label class="form-check-label" for="check_${campo.nome}">${campo.label}</label>
                </div>
                <input type="hidden" name="${campo.nome}" id="input_${campo.nome}" value="${campo.valor}">
            `;
        });

        html += `</div>
            <button type="submit" class="btn-primary w-100">${modo === 'editar' ? 'Salvar Alterações' : 'Salvar Nota'}</button>
        </form>`;

        if (modo === 'editar') {
            html += `<button type="button" class="btn btn-outline-danger w-100 mt-2" onclick="abrirModalNota('excluir', ${id})">Excluir Nota</button>`;
        }

        return html;
    }

    function editarConfiguracoesNota() {
        console.log("Função editarConfiguracoesNota() foi chamada!");
        fetch('/api/config')
            .then(r => r.json())
            .then(config => {
                const html = `
                    <form id="form-config">
                        <div class="mb-3">
                            <label class="form-label">Nome da Loja</label>
                            <input name="nome_loja" class="form-control" value="${config.nome_loja || ''}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Endereço</label>
                            <input name="endereco" class="form-control" value="${config.endereco || ''}">
                        </div>
                        <button type="submit" class="btn-primary w-100">Salvar Alterações</button>
                    </form>
                `;
                document.getElementById("conteudo-modal-nota").innerHTML = html;
                new bootstrap.Modal(document.getElementById("modalNotaFiscal")).show();
            });
    }

    document.addEventListener("submit", function (e) {
        if (e.target && e.target.id === "form-config") {
            e.preventDefault();

            const data = Object.fromEntries(new FormData(e.target).entries());

            fetch('/api/config', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
                .then(r => r.json())
                .then(resp => {
                    if (resp.success) {
                        alert("Configuração atualizada com sucesso!");
                        bootstrap.Modal.getInstance(document.getElementById("modalNotaFiscal")).hide();
                    } else {
                        alert("Erro ao salvar configurações.");
                    }
                })
                .catch(err => {
                    console.error("Erro ao enviar:", err);
                    alert("Erro ao enviar para a API.");
                });
        }
    });

    document.getElementById('form-upload-logo')?.addEventListener('submit', function (e) {
        e.preventDefault();
        let form = new FormData(this);
        fetch('/api/upload-imagem', { method: 'POST', body: form })
            .then(r => r.json())
            .then(resp => {
                if (resp.success) {
                    alert('Imagem salva!');
                    location.reload();
                } else {
                    alert('Falha: ' + (resp.error || 'Erro'));
                }
            });
    });

    window.onload = function () {
        let hoje = new Date().toISOString().slice(0, 10);
        document.getElementById('dataInicio').value = hoje;
        document.getElementById('dataFim').value = hoje;
        carregarRelatorio();

        fetch('/api/config')
            .then(r => r.json())
            .then(cfg => {
                let url = "/static/imagens/" + (cfg.imagem_logo || "default_logo.png");
                document.getElementById('logo-box').innerHTML = `<img src="${url}" class="img-fluid" alt="Logo">`;
            })
            .catch(() => {
                document.getElementById('logo-box').innerHTML = `<div class="logo-text">Logo</div>`;
            });
    };
    </script>
