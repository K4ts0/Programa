<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atendimento ao Cliente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #1cc88a;
            --accent-color: #36b9cc;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
            --light-bg: #f8f9fc;
            --card-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 69, 0.15);
        }
        
        body {
            background-color: var(--light-bg);
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        .container {
            max-width: 1200px;
        }
        
        .card {
            border: none;
            border-radius: 0.35rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .nav-tabs {
            border-bottom: 2px solid #e3e6f0;
        }
        
        .nav-tabs .nav-link {
            color: #5a5c69;
            border: none;
            font-weight: 600;
            padding: 1rem 1.5rem;
            border-radius: 0;
        }
        
        .nav-tabs .nav-link.active {
            color: var(--primary-color);
            background: transparent;
            border-bottom: 3px solid var(--primary-color);
        }
        
        .nav-tabs .nav-link:hover:not(.active) {
            border-bottom: 3px solid #dddfeb;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-success {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }
        
        .btn-info {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }
        
        .btn-warning {
            background-color: var(--warning-color);
            border-color: var(--warning-color);
        }
        
        .btn-danger {
            background-color: var(--danger-color);
            border-color: var(--danger-color);
        }
        
        .badge-primary {
            background-color: var(--primary-color);
        }
        
        .badge-success {
            background-color: var(--secondary-color);
        }
        
        .badge-info {
            background-color: var(--accent-color);
        }
        
        .badge-warning {
            background-color: var(--warning-color);
        }
        
        .badge-danger {
            background-color: var(--danger-color);
        }
        
        .pointer {
            cursor: pointer;
        }
        
        .d-flex-center {
            display: flex;
            align-items: center;
            gap: .75rem;
        }
        
        /* Cards de status */
        .atendimento-card {
            border-left: 5px solid var(--primary-color) !important;
            background: rgba(78, 115, 223, 0.05) !important;
        }
        
        .orcamento-card {
            border-left: 5px solid var(--warning-color) !important;
            background: rgba(246, 194, 62, 0.05) !important;
        }
        
        .agendamento-card {
            border-left: 5px solid var(--accent-color) !important;
            background: rgba(54, 185, 204, 0.05) !important;
        }
        
        /* Status borders */
        .status-pendente {
            border-left: 5px solid var(--warning-color);
        }
        
        .status-andamento {
            border-left: 5px solid var(--primary-color);
        }
        
        .status-concluido {
            border-left: 5px solid var(--secondary-color);
        }
        
        .status-cancelado {
            border-left: 5px solid var(--danger-color);
        }
        
        /* Form styles */
        .form-control, .form-select {
            border-radius: 0.35rem;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d3e2;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(78, 115, 223, 0.25);
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .nav-tabs .nav-link {
                padding: 0.75rem;
                font-size: 0.9rem;
            }
            
            .card-body {
                padding: 1rem;
            }
        }
        
        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* Botão Home flutuante */
        .btn-home {
        position: fixed; left: 20px; bottom: 20px; z-index: 1200;
        display: inline-flex; align-items: center; gap: 10px;
        padding: 10px 14px; border-radius: 999px; text-decoration: none;
        background: rgba(26,31,42,.85); color: #fff; border: 1px solid rgba(255,255,255,.08);
        box-shadow: 0 8px 24px rgba(0,0,0,.25); backdrop-filter: blur(6px);
        font-weight: 600; letter-spacing: .2px; transition: transform .15s ease, opacity .15s ease, background .2s ease;
        }
        .btn-home:hover { transform: translateY(-2px); background: rgba(26,31,42,.95); }
        .btn-home i { font-size: 1.1rem; line-height: 1; }
        @media (max-width: 640px){ .btn-home span { display: none; } }

        /* Adicione ao seu CSS existente */
        [id^="box-"] {
            transition: all 0.3s ease;
            border: 1px solid #e3e6f0;
            border-radius: 0.35rem;
            padding: 1rem;
            margin-top: 1rem;
            background-color: #f8f9fc;
        }

        /* Adicione este CSS para corrigir o layout dos botões */
        .card .row.align-items-center {
            display: flex;
            flex-wrap: wrap;
        }

        .card .row.align-items-center > div {
            margin-bottom: 0.5rem;
        }

        .card .row.align-items-center .text-end {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .card .row.align-items-center .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }

        /* Para telas menores, ajuste o layout */
        @media (max-width: 992px) {
            .card .row.align-items-center > div {
                flex: 0 0 100%;
                max-width: 100%;
            }
            
            .card .row.align-items-center .text-end {
                justify-content: flex-start;
                margin-top: 1rem;
            }
        }

        /* Para telas muito pequenas, ajuste ainda mais */
        @media (max-width: 576px) {
            .card .row.align-items-center .text-end {
                flex-wrap: wrap;
            }
            
            .card .row.align-items-center .btn-sm {
                margin-bottom: 0.25rem;
            }
        }

        /* Campo atendente readonly com estilo diferenciado */
        input[name="atendente"][readonly] {
            background-color: #e9ecef;
            cursor: default;
            font-weight: 500;
            color: var(--primary-color);
            border-color: #cbd5e0;
        }
    </style>
</head>
<body>
    <a href="/" class="btn-home" aria-label="Ir para a página inicial">
  <i class="bi bi-house-door-fill"></i><span>Home</span>
</a>

<div class="container py-4">
    <div class="d-flex align-items-center mb-4 gap-3">
        <h2 class="fw-bold flex-grow-1 text-gray-800">
            <i class="bi bi-people-fill me-2" style="color: var(--primary-color);"></i> Atendimento ao Cliente
        </h2>
        <div class="d-flex align-items-center">
            <label class="me-2 text-gray-600">Data:</label>
            <input type="date" id="dataFiltro" class="form-control w-auto" style="min-width:130px;">
        </div>
    </div>
    
    <!-- Abas -->
    <ul class="nav nav-tabs mb-4" id="abasAtendimento" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="aba-novo-tab" data-bs-toggle="tab" data-bs-target="#aba-novo" type="button" role="tab">
                <i class="bi bi-plus-circle me-1"></i> Novo Atendimento
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="aba-orcamento-tab" data-bs-toggle="tab" data-bs-target="#aba-orcamento" type="button" role="tab">
                <i class="bi bi-file-earmark-text me-1"></i> Orçamentos
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="aba-agendamento-tab" data-bs-toggle="tab" data-bs-target="#aba-agendamento" type="button" role="tab">
                <i class="bi bi-calendar-event me-1"></i> Agendamentos
            </button>
        </li>
    </ul>
    
    <div class="tab-content">
        <!-- Novo Atendimento -->
        <div class="tab-pane fade show active" id="aba-novo" role="tabpanel">
            <div class="card mb-4 fade-in">
                <div class="card-header py-3 d-flex justify-content-between align-items-center bg-white">
                    <h6 class="m-0 font-weight-bold text-primary">Registrar Novo Atendimento</h6>
                    <button class="btn btn-sm btn-primary" type="button" id="btnPesquisarCliente">
                        <i class="bi bi-search me-1"></i> Pesquisar Cliente
                    </button>
                </div>
                <div class="card-body">
                    <form id="formNovoAtendimento" class="row g-3 align-items-end" autocomplete="off">
                        <div class="col-md-4">
                            <label class="form-label text-gray-600">Cliente</label>
                            <input type="text" class="form-control" name="cliente_nome" id="novo_cliente_nome" required autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Contato</label>
                            <input type="text" class="form-control" name="contato" id="novo_cliente_contato" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Bairro</label>
                            <input type="text" class="form-control" name="bairro" id="novo_cliente_bairro" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Atendente</label>
                            <input type="text" class="form-control" name="atendente" id="novo_atendente" required readonly>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Tipo Principal</label>
                            <select class="form-select" name="tipo_servico" id="novo_tipo_servico" required>
                                <option value="venda">Venda</option>
                                <option value="servico">Serviço</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Valor Total</label>
                            <div class="input-group">
                                <span class="input-group-text">R$</span>
                                <input type="number" class="form-control" name="valor" step="0.01" required readonly>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-gray-600">Pagamento</label>
                            <select class="form-select" name="forma_pagamento" required>
                                <option value="dinheiro">Dinheiro</option>
                                <option value="boleto">Boleto</option>
                                <option value="pix">PIX</option>
                                <option value="cartao_credito">Cartão de Crédito</option>
                                <option value="cartao_debito">Cartão de Débito</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-gray-600">Observações</label>
                            <input type="text" class="form-control" name="observacoes">
                        </div>
                        
                        <!-- CARRINHO VENDA -->
                        <div class="col-md-12" id="box-produtos-venda">
                            <div class="d-flex-center mb-3">
                                <h6 class="m-0 font-weight-bold text-gray-700">Venda de Produtos</h6>
                                <button class="btn btn-sm btn-outline-info" type="button" id="btnAtivarServicoNoAtendimento">
                                    <i class="bi bi-plus-lg me-1"></i> Adicionar Serviço
                                </button>
                            </div>
                            <div class="row align-items-end g-2">
                                <div class="col-md-5">
                                    <label class="form-label mb-1 text-gray-600">Buscar Produto</label>
                                    <input type="text" class="form-control" id="buscaProdutoVenda" list="produtosVendaDatalist" placeholder="Nome/código..." autocomplete="off">
                                    <datalist id="produtosVendaDatalist"></datalist>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label mb-1 text-gray-600">Quantidade</label>
                                    <input type="number" min="1" value="1" class="form-control" id="quantidadeProdutoVenda">
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-primary w-100 mt-2" id="btnAddProduto" type="button">
                                        <i class="bi bi-cart-plus me-1"></i> Adicionar Produto
                                    </button>
                                </div>
                            </div>
                            <div class="mt-3" id="listaProdutosSelecionados"></div>
                        </div>
                        
                        <!-- CARRINHO SERVIÇO (inicia escondido) -->
                        <div class="col-md-12" id="box-servico-venda" style="display:none;">
                            <div class="d-flex-center mb-3">
                                <h6 class="m-0 font-weight-bold text-gray-700">Serviços</h6>
                                <button class="btn btn-sm btn-outline-info" type="button" id="btnAtivarVendaNoAtendimento">
                                    <i class="bi bi-plus-lg me-1"></i> Adicionar Venda
                                </button>
                            </div>
                            <div class="row align-items-end g-2">
                                <div class="col-md-5">
                                    <label class="form-label mb-1 text-gray-600">Buscar Serviço</label>
                                    <input type="text" class="form-control" id="buscaServicoVenda" list="servicosVendaDatalist" placeholder="Nome/descrição..." autocomplete="off">
                                    <datalist id="servicosVendaDatalist"></datalist>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label mb-1 text-gray-600">Qtd.</label>
                                    <input type="number" min="1" value="1" class="form-control" id="quantidadeServicoVenda">
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-primary w-100 mt-2" id="btnAddServico" type="button">
                                        <i class="bi bi-cart-plus me-1"></i> Adicionar Serviço
                                    </button>
                                </div>
                            </div>
                            <div class="mt-3" id="listaServicosSelecionados"></div>
                        </div>
                        
                        <div class="col-md-12 text-end mt-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-plus-circle me-1"></i> Registrar Atendimento
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="card fade-in">
                <div class="card-header py-3 bg-white">
                    <h6 class="m-0 font-weight-bold text-primary">Atendimentos em Andamento</h6>
                </div>
                <div class="card-body">
                    <div id="listaAtendimentosNovo"></div>
                </div>
            </div>
        </div>
        
        <!-- Orçamentos -->
        <div class="tab-pane fade" id="aba-orcamento" role="tabpanel">
            <div class="card mb-4 fade-in">
                <div class="card-header py-3 d-flex justify-content-between align-items-center bg-white">
                    <h6 class="m-0 font-weight-bold text-warning">Novo Orçamento</h6>
                    <button class="btn btn-sm btn-primary" type="button" id="btnPesquisarClienteOrcamento">
                        <i class="bi bi-search me-1"></i> Pesquisar Cliente
                    </button>
                </div>
                <div class="card-body">
                    <form id="formNovoOrcamento" class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label text-gray-600">Cliente</label>
                            <input type="text" class="form-control" name="cliente_nome" id="orc_cliente_nome" required autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Contato</label>
                            <input type="text" class="form-control" name="contato" id="orc_cliente_contato" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Bairro</label>
                            <input type="text" class="form-control" name="bairro" id="orc_cliente_bairro" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Atendente</label>
                            <input type="text" class="form-control" name="atendente" id="orc_atendente" required readonly>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Tipo Principal</label>
                            <select class="form-select" name="tipo_servico" id="orc_tipo_servico" required>
                                <option value="venda">Venda</option>
                                <option value="servico">Serviço</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Valor Total</label>
                            <div class="input-group">
                                <span class="input-group-text">R$</span>
                                <input type="number" class="form-control" name="valor" step="0.01" required readonly>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-gray-600">Pagamento</label>
                            <select class="form-select" name="forma_pagamento" required>
                                    <option value="dinheiro">Dinheiro</option>
                                    <option value="boleto">Boleto</option>
                                    <option value="pix">PIX</option>
                                    <option value="cartao_credito">Cartão de Crédito</option>
                                    <option value="cartao_debito">Cartão de Débito</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-gray-600">Observações</label>
                            <input type="text" class="form-control" name="observacoes">
                        </div>
                        
                        <!-- CARRINHO VENDA ORÇAMENTO -->
                        <div class="col-md-12" id="box-produtos-orcamento">
                            <div class="d-flex-center mb-3">
                                <h6 class="m-0 font-weight-bold text-gray-700">Venda de Produtos</h6>
                                <button class="btn btn-sm btn-outline-info" type="button" id="btnAtivarServicoNoOrcamento">
                                    <i class="bi bi-plus-lg me-1"></i> Adicionar Serviço
                                </button>
                            </div>
                            <div class="row align-items-end g-2">
                                <div class="col-md-5">
                                    <label class="form-label mb-1 text-gray-600">Buscar Produto</label>
                                    <input type="text" class="form-control" id="buscaProdutoOrcamento" list="produtosOrcamentoDatalist" placeholder="Nome/código..." autocomplete="off">
                                    <datalist id="produtosOrcamentoDatalist"></datalist>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label mb-1 text-gray-600">Quantidade</label>
                                    <input type="number" min="1" value="1" class="form-control" id="quantidadeProdutoOrcamento">
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-primary w-100 mt-2" id="btnAddProdutoOrcamento" type="button">
                                        <i class="bi bi-cart-plus me-1"></i> Adicionar Produto
                                    </button>
                                </div>
                            </div>
                            <div class="mt-3" id="listaProdutosOrcamentoSelecionados"></div>
                        </div>
                        
                        <!-- CARRINHO SERVIÇO ORÇAMENTO -->
                        <div class="col-md-12" id="box-servico-orcamento" style="display:none;">
                            <div class="d-flex-center mb-3">
                                <h6 class="m-0 font-weight-bold text-gray-700">Serviços</h6>
                                <button class="btn btn-sm btn-outline-info" type="button" id="btnAtivarVendaNoOrcamento">
                                    <i class="bi bi-plus-lg me-1"></i> Adicionar Venda
                                </button>
                            </div>
                            <div class="row align-items-end g-2">
                                <div class="col-md-5">
                                    <label class="form-label mb-1 text-gray-600">Buscar Serviço</label>
                                    <input type="text" class="form-control" id="buscaServicoOrcamento" list="servicosOrcamentoDatalist" placeholder="Nome/descrição..." autocomplete="off">
                                    <datalist id="servicosOrcamentoDatalist"></datalist>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label mb-1 text-gray-600">Qtd.</label>
                                    <input type="number" min="1" value="1" class="form-control" id="quantidadeServicoOrcamento">
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-primary w-100 mt-2" id="btnAddServicoOrcamento" type="button">
                                        <i class="bi bi-cart-plus me-1"></i> Adicionar Serviço
                                    </button>
                                </div>
                            </div>
                            <div class="mt-3" id="listaServicosOrcamentoSelecionados"></div>
                        </div>
                        
                        <div class="col-md-12 text-end mt-3">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-plus-circle me-1"></i> Registrar Orçamento
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="card fade-in">
                <div class="card-header py-3 bg-white">
                    <h6 class="m-0 font-weight-bold text-warning">Orçamentos Pendentes/Ativos</h6>
                </div>
                <div class="card-body">
                    <div id="listaOrcamentos"></div>
                </div>
            </div>
        </div>

        <!-- Agendamento -->
        <div class="tab-pane fade" id="aba-agendamento" role="tabpanel">
            <div class="card mb-4 fade-in">
                <div class="card-header py-3 d-flex justify-content-between align-items-center bg-white">
                    <h6 class="m-0 font-weight-bold text-info">Novo Agendamento</h6>
                    <button class="btn btn-sm btn-primary" type="button" id="btnPesquisarClienteAgendamento">
                        <i class="bi bi-search me-1"></i> Pesquisar Cliente
                    </button>
                </div>
                <div class="card-body">
                    <form id="formNovoAgendamento" class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label text-gray-600">Cliente</label>
                            <input type="text" class="form-control" name="cliente_nome" id="agendamento_cliente_nome" required autocomplete="off">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-gray-600">Contato</label>
                            <input type="text" class="form-control" name="contato" id="agendamento_cliente_contato" required>
                        </div>
                        <div class="col-md-2">

// ===== NOME DO USUÁRIO LOGADO =====
function getNomeUsuarioLogado() {
    // Primeiro, tenta pegar do sessionStorage (se você salvou lá)
    const nomeSession = sessionStorage.getItem('nome_usuario');
    if (nomeSession) return nomeSession;
    
    // Se não, usa o nome que veio do Flask (se você passar no render_template)
    // Você precisa adicionar isso no backend!
    return "{{ usuario_nome }}" || "Atendente";
}

// Função para preencher todos os campos de atendente
async function preencherAtendente() {
    const nomeUsuario = await getNomeUsuarioLogado();
    
    // Preenche em todas as abas
    const camposAtendente = [
        'novo_atendente',
        'orc_atendente',
        'agendamento_atendente'
    ];
    
    camposAtendente.forEach(id => {
        const campo = document.getElementById(id);
        if (campo) {
            campo.value = nomeUsuario;
        }
    });
}

// ======== VALOR TOTAL ========
function atualizarValorTotalAtendimento() {
    let total = 0;
    produtosSelecionados.forEach(item => total += (item.preco || 0) * (item.quantidade || 1));
    servicosSelecionados.forEach(item => total += (item.preco || 0) * (item.quantidade || 1));
    document.querySelector('#formNovoAtendimento input[name="valor"]').value = total.toFixed(2);
}
function atualizarValorTotalOrcamento() {
    let total = 0;
    produtosOrcamentoSelecionados.forEach(item => total += (item.preco || 0) * (item.quantidade || 1));
    servicosOrcamentoSelecionados.forEach(item => total += (item.preco || 0) * (item.quantidade || 1));
    document.querySelector('#formNovoOrcamento input[name="valor"]').value = total.toFixed(2);
}

    let total = 0;
    produtosAgendamentoSelecionados.forEach(item => total += (item.preco || 0) * (item.quantidade || 1));

document.getElementById('formPesquisaCliente').onsubmit = async function(e){
    e.preventDefault();

    if (!termo) return;
    
    // Busca com correspondência parcial para pesquisa
    let resp = await fetch(`${API}/clientes?search=${encodeURIComponent(termo)}`);
    let clientes = await resp.json();
    
    let html = clientes.length ? clientes.map(c=>
        `<div class="list-group-item pointer" onclick="selecionarClienteAtendimento('${encodeURIComponent(c.nome)}','${encodeURIComponent(c.contato)}','${encodeURIComponent(c.bairro)}')">
            <b>${c.nome}</b><br>
            Contato: ${c.contato} | Bairro: ${c.bairro}
        </div>`
    ).join('') : '<div class="alert alert-info">Nenhum cliente encontrado.</div>';
    
    document.getElementById('resultadosPesquisaCliente').innerHTML = `<div class="list-group">${html}</div>`;
};

window.selecionarClienteAtendimento = function(nome, contato, bairro){
    nome = decodeURIComponent(nome);
    contato = decodeURIComponent(contato);
    bairro = decodeURIComponent(bairro);

    // Só preenche a aba ativa
    let aba = window.modalAbaOrigem || "novo";
    let nomeInput = document.getElementById(aba+'_cliente_nome');
    let contatoInput = document.getElementById(aba+'_cliente_contato');
    let bairroInput = document.getElementById(aba+'_cliente_bairro');
    if(nomeInput) nomeInput.value = nome;
    if(contatoInput) contatoInput.value = contato;
    if(bairroInput) bairroInput.value = bairro;

    let modal = bootstrap.Modal.getInstance(document.getElementById('modalPesquisarCliente'));
    modal.hide();
};

document.getElementById('btnAddProduto').onclick = async function(){
    let nome = document.getElementById('buscaProdutoVenda').value;
    let qtd = parseInt(document.getElementById('quantidadeProdutoVenda').value) || 1;
    let resp = await fetch(`${API}/produtos?search=${encodeURIComponent(nome)}`);
    let lista = await resp.json();
    if(!lista.length){ alert("Produto não encontrado!"); return; }
    let produto = lista[0];
    let jaExiste = produtosSelecionados.find(p=>p.id===produto.id);
    if(jaExiste){ jaExiste.quantidade+=qtd; }
    else{
        produtosSelecionados.push({
            id:produto.id,
            nome:produto.nome,
            quantidade:qtd,
            preco: produto.preco
        });
    }
    renderCarrinhoProdutos();
    document.getElementById('buscaProdutoVenda').value = '';
    document.getElementById('quantidadeProdutoVenda').value = 1;
    atualizarValorTotalAtendimento();
};
function renderCarrinhoProdutos(){
    let html = produtosSelecionados.length
        ? `<ul class="list-group">${produtosSelecionados.map(p=>`

        : '<div class="text-muted">Nenhum produto adicionado</div>';
    document.getElementById('listaProdutosSelecionados').innerHTML = html;
}

window.alterarQuantidadeProduto = function(id, novaQtd){
    novaQtd = parseInt(novaQtd) || 1;
    let prod = produtosSelecionados.find(p => p.id === id);
    if(prod){
        prod.quantidade = novaQtd;
        renderCarrinhoProdutos();
        atualizarValorTotalAtendimento();
    }
}

window.removerProdutoCarrinho = function(id){
    produtosSelecionados = produtosSelecionados.filter(p=>p.id!==id);

    atualizarValorTotalAtendimento();
};

document.getElementById('formNovoAtendimento').onsubmit = async function(e){
    e.preventDefault();

    // Validação de produtos/serviços
    if (produtosSelecionados.length === 0 && servicosSelecionados.length === 0) {
        alert("Adicione pelo menos um produto ou serviço para registrar o atendimento.");
        return;
    }

    let fd = new FormData(this);
    let dados = {};
    fd.forEach((v,k)=>dados[k]=v);
    dados.valor = parseFloat(dados.valor) || 0;
    
    // Busca EXATA do cliente por nome, contato E bairro
    let resp = await fetch(`${API}/clientes?nome_exato=${encodeURIComponent(dados.cliente_nome)}&contato_exato=${encodeURIComponent(dados.contato)}&bairro_exato=${encodeURIComponent(dados.bairro)}`);
    let clientes = await resp.json();
    
    if (clientes.length > 0) {
        // Cliente exato encontrado
        dados.cliente_id = clientes[0].id;
    } else {
        // Se não encontrar cliente exato, cria um novo
        let respNovoCliente = await fetch(`${API}/clientes`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                nome: dados.cliente_nome,
                contato: dados.contato,
                bairro: dados.bairro,
                data_cadastro: new Date().toISOString()
            })
        });
        let novoCliente = await respNovoCliente.json();
        dados.cliente_id = novoCliente.cliente_id || novoCliente.id;
    }
    
    if(produtosSelecionados.length) dados.itens = produtosSelecionados;
    if(servicosSelecionados.length) dados.servicos = servicosSelecionados;
    dados.status = "andamento";
    dados.tipo_atendimento = "atendimento";
    
    try {
        let response = await fetch(`${API}/atendimentos`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(dados)
        });
        
        if (!response.ok) {
            throw new Error(`Erro HTTP: ${response.status}`);
        }
        
        this.reset();
        // Após reset, preenche novamente o atendente
        await preencherAtendente();
        produtosSelecionados = [];
        servicosSelecionados = [];
        renderCarrinhoProdutos();
        renderCarrinhoServicos();
        carregarAtendimentosNovo();
        alert("Atendimento registrado com sucesso!");
    } catch (error) {
        console.error("Erro ao registrar atendimento:", error);
        alert("Erro ao registrar atendimento: " + error.message);
    }
};

document.getElementById('formNovoAgendamento').onsubmit = async function(e){
    e.preventDefault();

    // Validação de produtos/serviços
    if (produtosAgendamentoSelecionados.length === 0 && servicosAgendamentoSelecionados.length === 0) {
        alert("Adicione pelo menos um produto ou serviço para registrar o agendamento.");
        return;
    }
    
    let formData = new FormData(this);
    let dados = {
        cliente_nome: formData.get('cliente_nome'),
        contato: formData.get('contato'),
        bairro: formData.get('bairro'),
        tipo_servico: formData.get('tipo_servico'),
        data_agendada: formData.get('data_agendada'),
        hora_agendada: formData.get('hora_agendada'),
        atendente: formData.get('atendente') || "Atendente Padrão",
        forma_pagamento: formData.get('forma_pagamento'),
        valor: formData.get('valor'),
        observacoes: formData.get('observacoes') || ""
    };
    
    // ===== VALIDAÇÃO DE DATA/HORA ÚNICA E ROBUSTA =====
    const agora = new Date();
    
    // Extrair componentes da data selecionada
    const [ano, mes, dia] = dados.data_agendada.split('-').map(Number);
    const [hora, minuto] = dados.hora_agendada.split(':').map(Number);
    
    // Criar data local corretamente (evita problema de timezone)
    const dataAgendamento = new Date(ano, mes - 1, dia, hora, minuto, 0, 0);
    
    // Criar "agora" truncado (sem segundos) para comparação justa
    const agoraTruncado = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate(),
                                   agora.getHours(), agora.getMinutes(), 0, 0);
    
    // REGRA: Agendamento deve ser estritamente futuro (> agora)
    if (dataAgendamento.getTime() <= agoraTruncado.getTime()) {
        alert(`? Não é possível agendar neste horário!\n\n` +
              `Data/Hora atual: ${agoraTruncado.toLocaleString('pt-BR')}\n` +
              `Data/Hora selecionada: ${dataAgendamento.toLocaleString('pt-BR')}\n\n` +
              `O agendamento deve ser para um momento futuro.`);
        return;
    }
    // ===== FIM DA VALIDAÇÃO =====
    
    dados.data_inicio = `${dados.data_agendada}T${dados.hora_agendada}`;
    
    try {
        // ... resto do código (busca cliente, envia API, etc) ...
        // (mantenha o restante igual ao seu original)
        
        let resp = await fetch(`${API}/clientes?nome_exato=${encodeURIComponent(dados.cliente_nome)}&contato_exato=${encodeURIComponent(dados.contato)}&bairro_exato=${encodeURIComponent(dados.bairro)}`);
        let clientes = await resp.json();
        
        if (clientes.length > 0) {
            dados.cliente_id = clientes[0].id;
        } else {
            let respNovoCliente = await fetch(`${API}/clientes`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    nome: dados.cliente_nome,
                    contato: dados.contato,
                    bairro: dados.bairro,
                    data_cadastro: new Date().toISOString()
                })
            });
            let novoCliente = await respNovoCliente.json();
            dados.cliente_id = novoCliente.id;
        }
        
        if(produtosAgendamentoSelecionados.length) dados.itens = produtosAgendamentoSelecionados;
        if(servicosAgendamentoSelecionados.length) dados.servicos = servicosAgendamentoSelecionados;
        
        let total = 0;
        if (dados.itens) total += dados.itens.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
        if (dados.servicos) total += dados.servicos.reduce((sum, servico) => sum + (servico.preco * servico.quantidade), 0);
        dados.valor = total;
        
        dados.status = "pendente";
        dados.tipo_atendimento = "agendamento";
        
        let respFinal = await fetch(`${API}/atendimentos`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(dados)
        });
        
        if (!respFinal.ok) throw new Error(`Erro HTTP: ${respFinal.status}`);
        
        this.reset();
        await preencherAtendente();
        produtosAgendamentoSelecionados = [];
        servicosAgendamentoSelecionados = [];
        renderCarrinhoProdutosAgendamento();
        renderCarrinhoServicosAgendamento();
        carregarAgendamentos();
        alert("Agendamento cadastrado com sucesso!");
        
    } catch (error) {
        console.error("Erro ao cadastrar agendamento:", error);
        alert(`Erro ao cadastrar agendamento: ${error.message}`);
    }
};

async function carregarAgendamentos() {
    try {
        let resp = await fetch(`${API}/atendimentos?tipo_atendimento=agendamento&status=pendente,andamento`);
        if (!resp.ok) throw new Error(`Erro HTTP: ${resp.status}`);
        let data = await resp.json();
        let hoje = new Date().toISOString().split('T')[0];
        
        let html = data.length ? data.map(a => {
            let dataHora = a.data_inicio ? a.data_inicio.split('T') : ['', ''];
            let dataStr = dataHora[0] || '-';
            let horaStr = dataHora[1] ? dataHora[1].substring(0,5) : '';
            let tipoBadge = `<span class="badge bg-info me-2"><i class="bi bi-calendar-event"></i> Agendamento</span>`;
            
            let statusBadge, cssClass;
            if (a.status === "andamento") {
                statusBadge = `<span class="badge badge-andamento">Em Andamento</span>`;
                cssClass = "status-andamento";
            } else {
                statusBadge = `<span class="badge badge-pendente">Pendente</span>`;
                cssClass = "status-pendente";
            }
            
            return `
            <div class="card my-2 px-3 py-2 ${cssClass} agendamento-card">
                <div class="row align-items-center">
                    <div class="col-md-3">
                        ${tipoBadge}
                        <b>${a.cliente_nome || 'Sem nome'}</b>
                    </div>
                    <div class="col-md-2">Contato: ${a.contato || '-'}</div>
                    <div class="col-md-2">Bairro: ${a.bairro || '-'}</div>
                    <div class="col-md-2">${statusBadge}</div>
                    <div class="col-md-2">${dataStr} ${horaStr ? `às ${horaStr}` : ''}</div>
                    <div class="col-md-1 text-end">
                        <button class="btn btn-success btn-sm" onclick="finalizarAgendamento(${a.id})"
                            ${a.status === "pendente" && dataStr !== hoje ? 'disabled' : ''}>
                            <i class="bi bi-check"></i>
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="cancelarAgendamento(${a.id})">
                            <i class="bi bi-x"></i>
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('') : `<div class="alert alert-info">Nenhum agendamento encontrado</div>`;
        
        document.getElementById('listaAgendamentos').innerHTML = html;
    } catch (error) {
        console.error("Erro ao carregar agendamentos:", error);
        document.getElementById('listaAgendamentos').innerHTML = `
            <div class="alert alert-danger">
                Erro ao carregar agendamentos: ${error.message}
            </div>`;
    }
}

function ativarBoxServico(idBoxServico) {
    // Esconde apenas as boxes relacionadas a esta aba específica
    if (idBoxServico.includes('venda')) {
        document.getElementById('box-produtos-venda').style.display = 'none';
        document.getElementById('box-servico-venda').style.display = 'block';
    } else if (idBoxServico.includes('orcamento')) {
        document.getElementById('box-produtos-orcamento').style.display = 'none';
        document.getElementById('box-servico-orcamento').style.display = 'block';
    } else if (idBoxServico.includes('agendamento')) {
        document.getElementById('box-produtos-agendamento').style.display = 'none';
        document.getElementById('box-servico-agendamento').style.display = 'block';
    }
}

function ativarBoxVenda(idBoxVenda) {
    // Esconde apenas as boxes relacionadas a esta aba específica
    if (idBoxVenda.includes('venda')) {
        document.getElementById('box-produtos-venda').style.display = 'block';
        document.getElementById('box-servico-venda').style.display = 'none';
    } else if (idBoxVenda.includes('orcamento')) {
        document.getElementById('box-produtos-orcamento').style.display = 'block';
        document.getElementById('box-servico-orcamento').style.display = 'none';
    } else if (idBoxVenda.includes('agendamento')) {
        document.getElementById('box-produtos-agendamento').style.display = 'block';
        document.getElementById('box-servico-agendamento').style.display = 'none';
    }
}

// Adicione também este código para garantir que a box correta seja mostrada ao carregar a página
document.addEventListener('DOMContentLoaded', function() {
    // Mostra apenas a box de venda em cada aba ao carregar
    document.getElementById('box-produtos-venda').style.display = 'block';
    document.getElementById('box-produtos-orcamento').style.display = 'block';
    document.getElementById('box-produtos-agendamento').style.display = 'block';
    
    // Garante que as boxes de serviço estejam escondidas
    document.getElementById('box-servico-venda').style.display = 'none';
    document.getElementById('box-servico-orcamento').style.display = 'none';
    document.getElementById('box-servico-agendamento').style.display = 'none';
});

function ativarBoxVenda(idBoxVenda) {
    document.getElementById(idBoxVenda).style.display = 'block';
    // Esconde o de serviço correspondente
    if(idBoxVenda === 'box-produtos-venda') {
        document.getElementById('box-servico-venda').style.display = 'none';
    }
    if(idBoxVenda === 'box-produtos-orcamento') {
        document.getElementById('box-servico-orcamento').style.display = 'none';
    }
    if(idBoxVenda === 'box-produtos-agendamento') {
        document.getElementById('box-servico-agendamento').style.display = 'none';
    }
}

    carregarAtendimentosNovo();
    carregarOrcamentos();
    carregarAgendamentos();
};
